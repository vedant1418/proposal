<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>❤️ A Special Surprise</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts">
        <span>❤️</span>
        <span>💕</span>
        <span>💖</span>
        <span>💘</span>
        <span>❤️</span>
        <span>💞</span>
        <span>💕</span>
        <span>💖</span>
    </div>

    <!-- Loading Screen -->
    <div id="loading">

        <div class="loader-box">

            <div class="heart-loader"></div>

            <h1>Preparing Something Special...</h1>

            <p>Please wait ❤️</p>

        </div>

    </div>

    <!-- Main Card -->
    <div id="main">

        <div class="glass-card">

            <i class="fa-solid fa-heart heart-icon"></i>

            <h1 id="title"></h1>

            <p id="message"></p>

            <button id="next" onclick="nextScene()">

                Continue ❤️

            </button>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
